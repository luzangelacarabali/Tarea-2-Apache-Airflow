# ============================================================
# spark-defaults.conf
# Configuración por defecto de Spark para el pipeline
# Iceberg + Nessie + MinIO (S3-compatible)
# ============================================================

# --- Extensiones de Iceberg y Nessie ---
spark.jars.packages                                         org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.1
spark.sql.extensions                                        org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions

# --- Catálogo Iceberg con Nessie como backend ---
spark.sql.catalog.nessie                                    org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl                       org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.uri                                http://fhbd-nessie:19120/api/v1
spark.sql.catalog.nessie.ref                                main
spark.sql.catalog.nessie.authentication.type                NONE
spark.sql.catalog.nessie.warehouse                          s3://iceberg/

# --- Conexión a MinIO como almacenamiento S3 ---
spark.hadoop.fs.s3a.endpoint                                http://fhbd-minio:9000
spark.hadoop.fs.s3a.access.key                              minioadmin
spark.hadoop.fs.s3a.secret.key                              minioadmin123
spark.hadoop.fs.s3a.path.style.access                       true
spark.hadoop.fs.s3a.impl                                    org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider                org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.connection.ssl.enabled                  false

# --- Optimizaciones de rendimiento ---
spark.sql.adaptive.enabled                                  true
spark.sql.adaptive.coalescePartitions.enabled               true
spark.executor.memory                                       1g
spark.driver.memory                                         1g
