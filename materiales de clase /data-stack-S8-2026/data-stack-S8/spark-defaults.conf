# ================== SPARK DEFAULTS ==================
# NOTA: spark.jars.packages NO se define aquí porque los JARs
# ya están bakeados en la imagen (Dockerfile.spark). Definirlo
# causaría descargas redundantes en cada sesión.

# --- Extensiones SQL (Iceberg + Nessie) ---
spark.sql.extensions                                  org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions

# --- Catálogo por defecto ---
spark.sql.defaultCatalog                              nessie

# --- Catálogo Nessie (Iceberg) ---
spark.sql.catalog.nessie                              org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl                 org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.uri                          http://nessie:19120/api/v1
spark.sql.catalog.nessie.ref                          main
spark.sql.catalog.nessie.authentication.type          NONE
spark.sql.catalog.nessie.warehouse                    s3a://warehouse/

# --- IO y S3 para Iceberg (S3FileIO apunta a MinIO) ---
spark.sql.catalog.nessie.io-impl                      org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.nessie.s3.endpoint                  http://minio:9000
spark.sql.catalog.nessie.s3.path-style-access         true
spark.sql.catalog.nessie.s3.region                    us-east-1

# --- Hadoop S3A (fs.s3a para lectura/escritura directa) ---
spark.hadoop.fs.s3a.impl                              org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint                          http://minio:9000
spark.hadoop.fs.s3a.path.style.access                 true
spark.hadoop.fs.s3a.aws.credentials.provider          org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider,com.amazonaws.auth.EnvironmentVariableCredentialsProvider

# --- JVM y rendimiento ---
spark.jars.ivy                                        /tmp/.ivy
spark.driver.extraJavaOptions                         -Duser.timezone=UTC -Daws.region=us-east-1
spark.executor.extraJavaOptions                       -Duser.timezone=UTC -Daws.region=us-east-1
